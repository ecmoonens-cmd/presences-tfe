<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suivi Yazio</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; background: #f0f4f8; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .card { background: white; border-radius: 16px; padding: 30px 24px; max-width: 420px; width: 100%; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
  .header { text-align: center; margin-bottom: 28px; }
  .header h1 { color: #1F3864; font-size: 22px; margin-bottom: 6px; }
  .header p { color: #666; font-size: 14px; }
  .form-group { margin-bottom: 24px; }
  label { display: block; font-weight: bold; color: #333; margin-bottom: 12px; font-size: 16px; }
  select { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; color: #333; background: white; cursor: pointer; }
  select:focus { outline: none; border-color: #1F3864; }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .option { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border: 2px solid #ddd; border-radius: 10px; cursor: pointer; transition: all 0.2s; }
  .option:hover { border-color: #1F3864; background: #f0f4ff; }
  .option.selected { border-color: #1F3864; background: #E3F2FD; }
  .option input { width: 18px; height: 18px; cursor: pointer; }
  .option span { font-size: 15px; color: #333; }
  .btn { width: 100%; padding: 14px; background: #1F3864; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 8px; }
  .btn:disabled { background: #aaa; }
  .message { text-align: center; padding: 16px; border-radius: 8px; margin-top: 16px; font-size: 16px; font-weight: bold; display: none; }
  .success { background: #d1fae5; color: #065f46; }
  .error { background: #fee2e2; color: #991b1b; }
  .divider { border: none; border-top: 1px solid #eee; margin: 20px 0; }
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <h1>📱 Suivi hebdomadaire Yazio</h1>
    <p>À remplir chaque lundi — Groupe A uniquement</p>
  </div>

  <div class="form-group">
    <label>Ton nom :</label>
    <select id="participant">
      <option value="">-- Choisis ton nom --</option>
      <optgroup label="Groupe A">
        <option value="Prenom1 Nom1">Prenom1 Nom1</option>
        <option value="Prenom2 Nom2">Prenom2 Nom2</option>
        <option value="Prenom3 Nom3">Prenom3 Nom3</option>
        <option value="Prenom4 Nom4">Prenom4 Nom4</option>
        <option value="Prenom5 Nom5">Prenom5 Nom5</option>
        <option value="Prenom6 Nom6">Prenom6 Nom6</option>
        <option value="Prenom7 Nom7">Prenom7 Nom7</option>
        <option value="Prenom8 Nom8">Prenom8 Nom8</option>
        <option value="Prenom9 Nom9">Prenom9 Nom9</option>
        <option value="Prenom10 Nom10">Prenom10 Nom10</option>
        <option value="Prenom11 Nom11">Prenom11 Nom11</option>
        <option value="Prenom12 Nom12">Prenom12 Nom12</option>
        <option value="Prenom13 Nom13">Prenom13 Nom13</option>
        <option value="Prenom14 Nom14">Prenom14 Nom14</option>
        <option value="Prenom15 Nom15">Prenom15 Nom15</option>
      </optgroup>
    </select>
  </div>

  <hr class="divider">

  <div class="form-group">
    <label>Combien de jours as-tu utilisé Yazio cette semaine ?</label>
    <select id="jours">
      <option value="">-- Choisis --</option>
      <option value="0">0 jour</option>
      <option value="1">1 jour</option>
      <option value="2">2 jours</option>
      <option value="3">3 jours</option>
      <option value="4">4 jours</option>
      <option value="5">5 jours</option>
      <option value="6">6 jours</option>
      <option value="7">7 jours</option>
    </select>
  </div>

  <div class="form-group">
    <label>Qu'est-ce que l'application t'a apporté cette semaine ?</label>
    <div class="options" id="apport">
      <div class="option" onclick="selectOption(this, 'Meilleure conscience de ce que je mange')">
        <input type="radio" name="apport" value="Meilleure conscience de ce que je mange">
        <span>🧠 Meilleure conscience de ce que je mange</span>
      </div>
      <div class="option" onclick="selectOption(this, 'Motivation à mieux manger')">
        <input type="radio" name="apport" value="Motivation à mieux manger">
        <span>💪 Motivation à mieux manger</span>
      </div>
      <div class="option" onclick="selectOption(this, 'Rien de particulier')">
        <input type="radio" name="apport" value="Rien de particulier">
        <span>😐 Rien de particulier</span>
      </div>
      <div class="option" onclick="selectOption(this, 'Je ne lai pas utilisée')">
        <input type="radio" name="apport" value="Je ne lai pas utilisée">
        <span>❌ Je ne l'ai pas utilisée</span>
      </div>
    </div>
  </div>

  <button class="btn" onclick="envoyer()">✅ Envoyer mon suivi</button>
  <div class="message" id="message"></div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyhGwZONvKn0mDVUwP2u9cxriiS3fLagmfF0bOqt7VmH1X6AL-3DdbPxZYwk4YlgkU/exec";

function selectOption(el, val) {
  document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
  el.classList.add('selected');
  el.querySelector('input').checked = true;
}

function envoyer() {
  var participant = document.getElementById('participant').value;
  var jours = document.getElementById('jours').value;
  var apport = document.querySelector('input[name="apport"]:checked');

  if (!participant) { afficherMessage("Merci de sélectionner ton nom !", "error"); return; }
  if (!jours) { afficherMessage("Merci d'indiquer le nombre de jours !", "error"); return; }
  if (!apport) { afficherMessage("Merci de sélectionner ce que l'app t'a apporté !", "error"); return; }

  var btn = document.querySelector('.btn');
  btn.disabled = true;
  btn.textContent = "Envoi en cours...";

  var now = new Date();
  var semaine = "Semaine du " + now.toLocaleDateString('fr-BE', {day:'2-digit', month:'2-digit', year:'numeric'});

  var url = SCRIPT_URL + "?type=yazio&nom=" + encodeURIComponent(participant) + "&jours=" + encodeURIComponent(jours) + "&apport=" + encodeURIComponent(apport.value) + "&semaine=" + encodeURIComponent(semaine);

  fetch(url, { mode: "no-cors" })
    .then(function() {
      afficherMessage("✅ Suivi enregistré, merci " + participant + " !", "success");
      btn.textContent = "✅ Envoyé !";
      btn.style.background = "#065f46";
      document.getElementById('participant').disabled = true;
      document.getElementById('jours').disabled = true;
      document.querySelectorAll('.option').forEach(o => o.style.pointerEvents = 'none');
    })
    .catch(function() {
      afficherMessage("✅ Suivi enregistré !", "success");
      btn.textContent = "✅ Envoyé !";
    });
}

function afficherMessage(texte, type) {
  var msg = document.getElementById('message');
  msg.textContent = texte;
  msg.className = 'message ' + type;
  msg.style.display = 'block';
}
</script>
</body>
</html>
